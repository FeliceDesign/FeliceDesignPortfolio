<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeliceDesignPortfolio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="all">
      <div class="topbar">
        <div class="logo"><img src="felicedesignlogo.svg" alt="Logo" /></div>
      </div>
      <div class="content">
        <div class="scrollableList">
          <div class="categorycontainer photographycontainer">
            <div class="photographycategory">
              <div class="categorypicturecontainer">
                <img src="images/photography.jpg" alt="Photography" />
              </div>
              <div class="categoryplaquecontainer">Photography</div>
            </div>
          </div>
          <div class="categorycontainer threedcontainer">
            <div class="threedcategory">
              <div class="categorypicturecontainer">
                <img src="images/threed.jpg" alt="3D-Design" />
              </div>
              <div class="categoryplaquecontainer">3D-Design</div>
            </div>
          </div>
          <div class="categorycontainer uicontainer">
            <div class="uicategory">
              <div class="categorypicturecontainer">
                <img src="images/ui.jpg" alt="UI/UX" />
              </div>
              <div class="categoryplaquecontainer">UI/UX Design</div>
            </div>
          </div>
          <div class="categorycontainer codingcontainer">
            <div class="codingcategory">
              <div class="categorypicturecontainer">
                <img src="images/coding.jpg" alt="Coding" />
              </div>
              <div class="categoryplaquecontainer">Coding</div>
            </div>
          </div>
        </div>
      </div>
      <div class="bottombar">Impressum</div>
    </div>
  </body>
</html>
